version: "1"
services:
  # API Service — handles HTTP, WebSocket, and core business logic
  - type: web
    name: kridaz-api
    runtime: node
    rootDir: server
    buildCommand: corepack enable && corepack prepare pnpm@10.28.0 --activate && pnpm install --no-frozen-lockfile
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_WORKERS
        value: "false"
      - key: PORT
        value: 4000
      # ... (Existing env vars should be configured in Render dashboard)

  # Worker Service — handles CPU-heavy media processing (FFmpeg)
  - type: worker
    name: kridaz-worker
    runtime: node
    rootDir: server
    buildCommand: corepack enable && corepack prepare pnpm@10.28.0 --activate && pnpm install --no-frozen-lockfile
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_WORKERS
        value: "true"
      # ... (Existing env vars should be configured in Render dashboard)

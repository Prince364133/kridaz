name: kridaz
description: Kridaz — book grounds, host games, score live, and connect with players.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Fonts
  cupertino_icons: ^1.0.2
  google_fonts: ^6.3.2
  
  # HTTP Client for Kridaz backend
  http: ^1.2.0
  dio: ^5.4.0
  logger: ^2.0.2
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.2
  
  # Google Services (Using stable v6.x for better compatibility)
  google_sign_in: ^6.2.1
  # Apple Sign-In — required by App Store guideline 4.8 when Google Sign-In
  # is offered. Used on iOS only; on Android the button is hidden.
  sign_in_with_apple: ^6.1.0
  
  # Local Storage
  shared_preferences: ^2.4.0
  
  # Media & Permissions
  image_picker: ^1.2.0

  # Phone contacts — used to pick a player from the phone book when inviting
  # custom (non-registered) team members. Permission is requested at use time.
  flutter_contacts: ^1.1.9+2
  
  # Network
  connectivity_plus: ^6.1.0
  cached_network_image: ^3.3.1

  # Sharing
  share_plus: ^10.1.2

  # Date formatting
  intl: ^0.20.0

  # Payments
  razorpay_flutter: ^1.3.7

  # QR Code
  qr_flutter: ^4.1.0

  # Temp directory access for saving Team Pass PNG
  path_provider: ^2.1.0

  # URL Launching
  url_launcher: ^6.3.0

  # Maps & Location
  google_maps_flutter: ^2.13.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # SVG Support
  flutter_svg: ^2.0.10+1

  # Calendar
  table_calendar: ^3.1.2

  # Charts
  fl_chart: ^0.69.2

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # WebSocket for real-time chat
  web_socket_channel: ^2.4.0

  # Socket.IO client for real-time chat (backend uses Socket.IO, not raw WebSocket)
  socket_io_client: ^2.0.3+1

  # Video player for reels
  video_player: ^2.9.2

  # Lucide icons — shared icon vocabulary with the web frontend
  # (web uses lucide-react; this is the Flutter port of the same icon set).
  lucide_icons_flutter: ^3.1.14+2

  # Firebase + Cloud Messaging for push notifications. Requires the matching
  # native config (google-services.json on Android, GoogleService-Info.plist
  # on iOS) — see MOBILE_LAUNCH_CHECKLIST.md.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # WebView — used to render legal pages (T&C, Privacy, FAQ, Contact, Data
  # Deletion) from the Kridaz web frontend so copy stays canonical.
  webview_flutter: ^4.10.0

  # ── New networking architecture (lib/core/network) ─────────────────────────
  flutter_secure_storage: ^9.2.2   # Keystore/Keychain-backed token storage
  uuid: ^4.5.1                     # X-Request-Id generation
  pretty_dio_logger: ^1.4.0        # Debug-only Dio logging
  freezed_annotation: ^2.4.4       # Immutable DTOs
  json_annotation: ^4.9.0          # JSON (de)serialization
  crypto: ^3.0.3                   # SHA-256 for cert pinning

  # Crash + error reporting
  sentry_flutter: ^8.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/screens/
    - assets/images/icons/
    - assets/images/3d_icons/
    - assets/images/home/
    - assets/images/sports/
    - assets/images/gender/
    - assets/images/backgrounds/
    - assets/images/onboarding/
    - assets/images/header/
    - assets/images/pros/
    - assets/icons/
    - assets/icons/reels/
    - assets/videos/

name: mobile-ci

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.24.x'
  # CI uses non-secret placeholders so asserts pass — release builds inject
  # real values via the secrets-driven build workflow.
  RAZORPAY_KEY_ID: 'rzp_test_ci_placeholder'
  CERT_PINS: ''
  SENTRY_DSN: ''
  ENV: 'prod'

jobs:
  analyze-test:
    name: analyze + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter --version

      - name: Resolve packages
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      # Errors are blocking; warnings + infos (unused imports / dead code,
      # ~76 outstanding) are tracked separately. Drop the --no-fatal flags
      # once that backlog is cleared.
      - name: Static analysis
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Unit + widget tests
        run: |
          flutter test \
            --dart-define=RAZORPAY_KEY_ID=$RAZORPAY_KEY_ID \
            --dart-define=ENV=$ENV

<!DOCTYPE html>
<html>
<head>
  <title>Firebase Phone Auth Test</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCw1nodfsbj1w6gyDNsiwDl87A818cgN0Y",
      authDomain: "grounds-booking-dc802.firebaseapp.com",
      projectId: "grounds-booking-dc802",
      storageBucket: "grounds-booking-dc802.firebasestorage.app",
      messagingSenderId: "9445008437",
      appId: "1:9445008437:web:b74d5a2d9f6ad5d9a57d7c",
      measurementId: "G-B9WRH0Q80T"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Using VISIBLE reCAPTCHA instead of invisible.
    // Sometimes invisible reCAPTCHA is blocked by local ad-blockers or fails silently.
    window.setupRecaptcha = () => {
      window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
        'size': 'normal',
        'callback': (response) => {
          document.getElementById('status').innerText = 'reCAPTCHA verified! You can now click Send OTP.';
          document.getElementById('send-btn').disabled = false;
        },
        'expired-callback': () => {
          document.getElementById('send-btn').disabled = true;
          document.getElementById('status').innerText = 'reCAPTCHA expired. Please solve it again.';
        }
      });
      window.recaptchaVerifier.render().then(function(widgetId) {
        window.recaptchaWidgetId = widgetId;
      });
    };

    window.sendOTP = () => {
      const phoneNumber = document.getElementById('phone').value;
      const appVerifier = window.recaptchaVerifier;
      document.getElementById('status').innerText = 'Sending OTP...';
      
      signInWithPhoneNumber(auth, phoneNumber, appVerifier)
        .then((confirmationResult) => {
          window.confirmationResult = confirmationResult;
          document.getElementById('status').innerText = 'OTP sent successfully! Please check your phone.';
        }).catch((error) => {
          console.error(error);
          document.getElementById('status').innerText = 'Error: ' + error.message;
        });
    };

    window.verifyOTP = () => {
      const code = document.getElementById('code').value;
      if (!window.confirmationResult) {
        document.getElementById('status').innerText = 'Error: Please send OTP first.';
        return;
      }
      document.getElementById('status').innerText = 'Verifying OTP...';
      window.confirmationResult.confirm(code).then((result) => {
        const user = result.user;
        document.getElementById('status').innerText = 'Verified successfully! User UID: ' + user.uid;
      }).catch((error) => {
        console.error(error);
        document.getElementById('status').innerText = 'Error: ' + error.message;
      });
    };

    // Initialize recaptcha on page load
    window.onload = () => {
      window.setupRecaptcha();
    };
  </script>
</head>
<body style="font-family: sans-serif; padding: 20px;">
  <h2>Firebase Phone Auth Test (Visible reCAPTCHA)</h2>
  
  <p>1. Please solve the reCAPTCHA first:</p>
  <div id="recaptcha-container" style="margin-bottom: 20px;"></div>
  
  <p>2. Then send the OTP:</p>
  <div style="margin-bottom: 20px;">
    <label>Phone Number (with country code):</label><br>
    <input type="text" id="phone" value="+916205170591" style="padding: 5px; font-size: 16px; width: 200px;" />
    <button id="send-btn" onclick="sendOTP()" disabled style="padding: 5px 10px; font-size: 16px;">Send OTP</button>
  </div>
  
  <p>3. Finally, verify the OTP:</p>
  <div style="margin-bottom: 20px;">
    <label>OTP Code:</label><br>
    <input type="text" id="code" placeholder="123456" style="padding: 5px; font-size: 16px; width: 100px;" />
    <button onclick="verifyOTP()" style="padding: 5px 10px; font-size: 16px;">Verify OTP</button>
  </div>
  
  <p id="status" style="font-weight: bold; color: #333;"></p>
</body>
</html>

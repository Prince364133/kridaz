version: "1"
services:
  # ── Web API Service ─────────────────────────────────────────────────────────
  # Handles all HTTP/WebSocket traffic.
  # ENABLE_WORKERS=false keeps FFmpeg/HLS transcoding off this instance
  # so media processing never competes with request handling for CPU time.
  - type: web
    name: kridaz-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # ── Core ──────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: TIMEZONE
        value: Asia/Kolkata
      - key: APP_BASE_URL
        value: https://kridaz.com
      # Disable CPU-heavy media workers on the API process
      - key: ENABLE_WORKERS
        value: "false"

      # ── Database & Cache ───────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

      # ── Auth & Security ────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_SECRET
        sync: false

      # ── Email / SMTP ───────────────────────────────────────────────────────
      - key: EMAIL
        sync: false
      - key: PASSWORD
        sync: false

      # ── Cloudinary (image uploads) ─────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Cloudflare R2 (HLS video storage) ─────────────────────────────────
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      # Public CDN URL for serving HLS manifests and segments
      - key: REELS_CDN_URL
        sync: false

      # ── Payment (Razorpay) ────────────────────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      # ── CORS ──────────────────────────────────────────────────────────────
      - key: CLIENT_URLS
        sync: false

      # ── OAuth: Google / YouTube ───────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false


      # ── Monitoring (optional, gracefully skipped if absent) ───────────────
      - key: SENTRY_DSN
        sync: false

      # ── MSG91 (WhatsApp & SMS) ─────────────────────────────────────────────
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_WHATSAPP_SENDER
        sync: false
      - key: MSG91_WHATSAPP_NOTIF_TEMPLATE
        sync: false

      # ── Turnstile (CAPTCHA) ───────────────────────────────────────────────
      - key: TURNSTILE_SECRET_KEY
        sync: false

      # ── OpenAI (AI Commentary) ────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false

      # ── Auxiliary URLs ────────────────────────────────────────────────────
      - key: USER_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: COOKIE_DOMAIN
        sync: false

      # ── Secure Tokens ─────────────────────────────────────────────────────
      - key: DOCS_TOKEN
        sync: false
      - key: METRICS_TOKEN
        sync: false
      - key: OVERLAY_TOKEN_SECRET
        sync: false

  # ── Background Worker Service ────────────────────────────────────────────────
  # Runs FFmpeg/HLS transcoding, BullMQ consumers, and media queues.
  # Scaled independently — add instances here when queue depth grows
  # without touching the web API process at all.
  - type: worker
    name: kridaz-worker
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # ── Core ──────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: TIMEZONE
        value: Asia/Kolkata
      - key: APP_BASE_URL
        value: https://kridaz.com
      # Enable media workers ONLY on this dedicated process
      - key: ENABLE_WORKERS
        value: "true"

      # ── Database & Cache ───────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

      # ── Auth & Security ────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_SECRET
        sync: false

      # ── Cloudflare R2 (required for uploading transcoded HLS output) ───────
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: REELS_CDN_URL
        sync: false

      # ── Cloudinary (thumbnail fallback) ───────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Monitoring ────────────────────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false

      # ── MSG91 (Required in Worker for background notification dispatches) ──
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_WHATSAPP_SENDER
        sync: false
      - key: MSG91_WHATSAPP_NOTIF_TEMPLATE
        sync: false

      # ── OpenAI (Required in Worker for background AI Commentary generation)
      - key: OPENAI_API_KEY
        sync: false

      # ── Auxiliary URLs ────────────────────────────────────────────────────
      - key: USER_URL
        sync: false
      - key: CLIENT_URL
        sync: false


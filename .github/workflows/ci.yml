name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      pnpm_cache_dir: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Get pnpm cache directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

  server-ci:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'server/pnpm-lock.yaml'

      - name: Install Server Dependencies
        run: |
          cd server
          pnpm install --frozen-lockfile

      - name: Run Server Tests
        run: |
          cd server
          pnpm test -- --runInBand
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}

  client-ci:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'client/user/pnpm-lock.yaml'

      - name: Install Client Dependencies
        run: |
          cd client/user
          pnpm install --frozen-lockfile

      - name: Build Client
        run: |
          cd client/user
          pnpm run build

  security-scan:
    needs: [server-ci, client-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: pnpm audit
        run: |
          cd server && pnpm audit
          cd ../client/user && pnpm audit

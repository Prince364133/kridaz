name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  ACR_NAME: kridazacr # Replace with your ACR name
  RESOURCE_GROUP: kridaz-rg # Replace with your Resource Group
  ACA_ENV: kridaz-env # Replace with your ACA Environment Name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # --- Build and Push API & Worker ---
      - name: Build Server Image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/kridaz-api:${{ github.sha }} -t ${{ env.ACR_NAME }}.azurecr.io/kridaz-api:latest -f server/Dockerfile .
          docker push ${{ env.ACR_NAME }}.azurecr.io/kridaz-api:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/kridaz-api:latest

      # Since Worker uses the same Dockerfile, we tag it similarly for the worker app
      - name: Tag and Push Worker Image
        run: |
          docker tag ${{ env.ACR_NAME }}.azurecr.io/kridaz-api:latest ${{ env.ACR_NAME }}.azurecr.io/kridaz-worker:${{ github.sha }}
          docker tag ${{ env.ACR_NAME }}.azurecr.io/kridaz-api:latest ${{ env.ACR_NAME }}.azurecr.io/kridaz-worker:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/kridaz-worker:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/kridaz-worker:latest

      # --- Build and Push User Web ---
      - name: Build User Web Image
        run: |
          cat <<EOF > client/user/.env.production
          VITE_API_URL=https://api.kridaz.com/
          VITE_USER_URL=https://kridaz.vercel.app,https://www.kridaz.com
          VITE_GOOGLE_CLIENT_ID=615790581143-k4g37kb3krcfnh1p64aodd2qa3le5q96.apps.googleusercontent.com
          VITE_RAZORPAY_KEY_ID=rzp_live_SweOO8CAlfwtzg
          VITE_REELS_CDN_URL=https://pub-cc243bd179ab45ee94097baeca380dd4.r2.dev
          VITE_TURNSTILE_SITE_KEY=0x4AAAAAADTyPk2TuxnL09q7
          EOF
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/kridaz-user-web:${{ github.sha }} -t ${{ env.ACR_NAME }}.azurecr.io/kridaz-user-web:latest -f client/user/Dockerfile .
          docker push ${{ env.ACR_NAME }}.azurecr.io/kridaz-user-web:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/kridaz-user-web:latest

      # --- Build and Push Admin Web ---
      - name: Build Admin Web Image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/kridaz-admin-web:${{ github.sha }} -t ${{ env.ACR_NAME }}.azurecr.io/kridaz-admin-web:latest -f client/admin/Dockerfile .
          docker push ${{ env.ACR_NAME }}.azurecr.io/kridaz-admin-web:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/kridaz-admin-web:latest

      # --- Deploy to Azure Container Apps ---
      - name: Deploy API
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: kridaz-api
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/kridaz-api:${{ github.sha }}

      - name: Deploy Worker
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: kridaz-worker
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/kridaz-worker:${{ github.sha }}

      - name: Deploy User Web
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: kridaz-user-web
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/kridaz-user-web:${{ github.sha }}

      - name: Deploy Admin Web
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: kridaz-admin-web
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/kridaz-admin-web:${{ github.sha }}

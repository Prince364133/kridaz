name: Kridaz Monorepo CI/CD

on:
  push:
    branches: [ main, version3 ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (Lint & Build All)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.0

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build All Packages
        run: pnpm run build

  build-backend:
    name: Build Backend Package
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.0

      - name: Install Monorepo Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm --filter common run build && pnpm --filter shared-constants run build

      - name: Generate Prisma Client
        run: cd server && pnpm dlx prisma generate

      - name: Create Backend Deployment Package
        run: |
          mkdir -p deploy/packages/common
          mkdir -p deploy/packages/shared-constants
          
          # Copy server files
          rsync -av --exclude='node_modules' --exclude='scratch' --exclude='logs' --exclude='.env' --exclude='tests' server/ deploy/
          
          # Copy common package
          cp packages/common/package.json deploy/packages/common/
          cp -r packages/common/dist deploy/packages/common/
          cp -r packages/common/src deploy/packages/common/
          
          # Copy shared-constants
          cp packages/shared-constants/package.json deploy/packages/shared-constants/
          cp -r packages/shared-constants/src deploy/packages/shared-constants/
          
          # Copy startup script
          cp startup.sh deploy/
          
          cd deploy
          
          # Fix workspace references and remove packageManager field
          sed -i 's/"@kridaz\/common":\s*"workspace:\*"/"@kridaz\/common": "file:.\/packages\/common"/' package.json
          sed -i 's/"@kridaz\/shared-constants":\s*"workspace:\*"/"@kridaz\/shared-constants": "file:.\/packages\/shared-constants"/' package.json
          sed -i '/"packageManager":/d' package.json
          
          # Fix common's package.json
          sed -i 's/"@kridaz\/shared-constants":\s*"workspace:\*"/"@kridaz\/shared-constants": "file:..\/shared-constants"/' packages/common/package.json
          
          # Ensure startup.sh is executable
          chmod +x startup.sh

          # Install production dependencies for Linux target
          npm install --omit=dev
          npm install --os=linux --cpu=x64 sharp
          
          # Pre-generate Prisma client for the production target
          npx prisma generate
          
          # Zip the deployment artifact
          zip -q -r ../backend-artifact.zip .

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: backend-artifact.zip

  build-frontends:
    name: Build Frontends
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.0

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build User Frontend
        run: pnpm --filter user run build

      - name: Build Admin Frontend
        run: pnpm --filter admin run build

      - name: Zip User Frontend Dist
        run: cd client/user/dist && zip -q -r ../../../user-artifact.zip .

      - name: Zip Admin Frontend Dist
        run: cd client/admin/dist && zip -q -r ../../../admin-artifact.zip .

      - name: Upload User Artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-artifact
          path: user-artifact.zip

      - name: Upload Admin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-artifact
          path: admin-artifact.zip

  deploy-backend:
    name: Deploy Backend to Azure
    needs: build-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/version3'
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Kridaz'
          package: backend-artifact.zip

  deploy-user-frontend:
    name: Deploy User Frontend to Azure
    needs: build-frontends
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/version3'
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: user-artifact

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'kridaz-web'
          package: user-artifact.zip
          startup-command: 'pm2 serve /home/site/wwwroot --no-daemon --spa'

  deploy-admin-frontend:
    name: Deploy Admin Frontend to Azure
    needs: build-frontends
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/version3'
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-artifact

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'kridaz-admin'
          package: admin-artifact.zip
          startup-command: 'pm2 serve /home/site/wwwroot --no-daemon --spa'

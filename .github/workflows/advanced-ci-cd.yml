name: Kridaz Monorepo CI/CD

on:
  push:
    branches: [ main, version1, version2, version3, dev_test_production ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: prince364133/kridaz

jobs:
  build-and-push-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-backend:${{ github.sha }}

      - name: Inject User Web Environment Variables
        run: |
          cat <<EOF > client/user/.env.production
          VITE_API_URL=https://api.kridaz.com/
          VITE_USER_URL=https://kridaz.vercel.app,https://www.kridaz.com
          VITE_GOOGLE_CLIENT_ID=615790581143-k4g37kb3krcfnh1p64aodd2qa3le5q96.apps.googleusercontent.com
          VITE_RAZORPAY_KEY_ID=rzp_live_SweOO8CAlfwtzg
          VITE_REELS_CDN_URL=https://pub-cc243bd179ab45ee94097baeca380dd4.r2.dev
          VITE_TURNSTILE_SITE_KEY=0x4AAAAAADTyPk2TuxnL09q7
          EOF

      - name: Build and push User Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./client/user/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-user-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-user-web:${{ github.sha }}

      - name: Inject Admin Web Environment Variables
        run: |
          cat <<EOF > client/admin/.env.production
          VITE_API_URL=https://api.kridaz.com/
          EOF

      - name: Build and push Admin Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./client/admin/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-admin-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-admin-web:${{ github.sha }}

  deploy-to-azure:
    name: Deploy Containers to Azure
    needs: build-and-push-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/version1' || github.ref == 'refs/heads/version2' || github.ref == 'refs/heads/version3' || github.ref == 'refs/heads/Production' || github.ref == 'refs/heads/dev_test_production'
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Kridaz'
          images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-backend:${{ github.sha }}'

      - name: Deploy User Frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'kridaz-web'
          images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-user-web:${{ github.sha }}'

      - name: Deploy Admin Frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'kridaz-admin'
          images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-admin-web:${{ github.sha }}'

      - name: Deploy Worker to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'kridaz-worker'
          images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-backend:${{ github.sha }}'

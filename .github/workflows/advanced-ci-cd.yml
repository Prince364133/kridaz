name: Advanced CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (Lint, Test, Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linters & Formatting Check
        run: pnpm run lint && pnpm run format

      - name: Run Type Checks
        # Assuming type-check exists in the client user package
        run: pnpm --filter user run type-check || echo "Type check skipped or not configured"

      - name: Run Tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}
          # Mock Redis URL for test environment if required by tests
          REDIS_URL: redis://localhost:6379 
        run: pnpm run test:all --coverage

      - name: Check Coverage
        run: |
          echo "Checking if global statement coverage is >= 60%"
          # Using nyc to check coverage thresholds across the monorepo
          npx nyc check-coverage --statements 60

      - name: Run Build
        run: pnpm run build

      - name: Security Scan (pnpm audit)
        run: pnpm audit --prod || echo "Audit found vulnerabilities, check details."

  # Deployment Phase - Continuous Deployment (CD)
  # These jobs only run on the main branch and if specific secrets are available.

  deploy-vercel:
    name: Deploy Frontend to Vercel
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

  deploy-railway:
    name: Deploy Backend to Railway
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout Code
        if: env.RAILWAY_TOKEN != ''
        uses: actions/checkout@v4
      - name: Setup Railway CLI
        if: env.RAILWAY_TOKEN != ''
        run: npm i -g @railway/cli
      - name: Deploy to Railway
        if: env.RAILWAY_TOKEN != ''
        run: railway up --service server --detach

  deploy-aws:
    name: Deploy to AWS
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout Code
        if: env.AWS_ACCESS_KEY_ID != ''
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        if: env.AWS_ACCESS_KEY_ID != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Deploy via AWS CLI/EB
        if: env.AWS_ACCESS_KEY_ID != ''
        # Add your AWS deployment commands here, e.g., for Elastic Beanstalk or ECS
        run: |
          echo "AWS Credentials Configured."
          echo "Replace this with actual AWS deployment script (e.g., aws s3 sync or eb deploy)."

  deploy-azure:
    name: Deploy to Azure
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
    steps:
      - name: Checkout Code
        if: env.AZURE_CREDENTIALS != ''
        uses: actions/checkout@v4
      - name: Login to Azure
        if: env.AZURE_CREDENTIALS != ''
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy via Azure Web Apps
        if: env.AZURE_CREDENTIALS != ''
        # Replace placeholders with actual Azure Web App Name
        # uses: azure/webapps-deploy@v2
        # with:
        #   app-name: 'YOUR_APP_NAME'
        #   package: .
        run: |
          echo "Azure Credentials Configured."
          echo "Replace this with actual Azure Web App deployment command."

name: Kridaz Monorepo CI/CD

on:
  push:
    branches: [ dev_test_production, version3 ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: prince364133/kridaz

jobs:
  build-and-push-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-backend:${{ github.sha }}

      - name: Build and push User Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./client/user/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-user-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-user-web:${{ github.sha }}

      - name: Build and push Admin Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./client/admin/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-admin-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-admin-web:${{ github.sha }}

  deploy-to-azure:
    name: Deploy Containers to Azure
    needs: build-and-push-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/version3' || github.ref == 'refs/heads/Production' || github.ref == 'refs/heads/dev_test_production'
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Kridaz'
          images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-backend:${{ github.sha }}'

      - name: Deploy User Frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'kridaz-web'
          images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-user-web:${{ github.sha }}'

      - name: Deploy Admin Frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'kridaz-admin'
          images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-admin-web:${{ github.sha }}'

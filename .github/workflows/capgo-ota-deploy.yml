name: Capgo OTA Bundle Deploy

on:
  push:
    branches:
      - android-app

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-ota:
    name: Compile and Push Capgo OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile Production Web Assets
        run: pnpm --filter user run build

      - name: Upload OTA Bundle to Capgo Cloud
        working-directory: ./client/user
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
        run: npx @capgo/cli bundle upload --apikey ${{ secrets.CAPGO_TOKEN }}

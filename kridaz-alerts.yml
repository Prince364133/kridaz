groups:
  - name: kridaz-slo-alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_request_duration_seconds_count{status_code=~"5.."}[5m]) / rate(http_request_duration_seconds_count[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High API Error Rate"
          description: "API is returning 5xx errors for more than 5% of requests over 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API Latency"
          description: "95th percentile latency is greater than 1 second."

      - alert: QueueBackup
        expr: sum by (queue_name) (queue_depth_total{status="waiting"}) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Background Jobs Queue Backup"
          description: "More than 100 jobs are waiting in queue '{{ $labels.queue_name }}' for over 10 minutes."
